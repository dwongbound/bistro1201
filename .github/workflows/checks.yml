name: Checks

on:
  pull_request:
  push:
    branches:
      - '**'

jobs:
  frontend-tests:
    name: Frontend Jest
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend unit tests
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ../artifacts
          npm test -- --runInBand 2>&1 | tee ../artifacts/frontend-jest.txt

      - name: Upload frontend test artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: frontend-jest-report
          path: artifacts/frontend-jest.txt
          if-no-files-found: error

  backend-tests:
    name: Backend Cargo Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: bistro1201_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d bistro1201_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/bistro1201_test

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build output
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Run backend unit tests
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ../artifacts
          cargo test 2>&1 | tee ../artifacts/backend-cargo-test.txt

      - name: Upload backend test artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: backend-cargo-test-report
          path: artifacts/backend-cargo-test.txt
          if-no-files-found: error
