name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  frontend-tests:
    name: Frontend Jest
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend unit tests
        run: npm test -- --runInBand

  backend-tests:
    name: Backend Cargo Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: bistro1201_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d bistro1201_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/bistro1201_test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build output
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Run backend unit tests
        run: cargo test

  e2e-tests:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs:
      - frontend-tests
      - backend-tests

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run isolated Playwright suite
        run: |
          docker compose --env-file env/test.env --profile test run --rm e2e sh -lc \
            "npm ci && npx playwright test --reporter=line"

      - name: Tear down isolated E2E stack
        if: always()
        run: docker compose --env-file env/test.env --profile test down -v
